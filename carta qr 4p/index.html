<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuatro Perras - Carta Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 100%;
            margin: 0 auto;
            background: white;
        }

        .page-section {
            width: 100%;
            display: block;
        }

        .page-section img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Loading animation */
        .page-section {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive adjustments */
        @media (min-width: 768px) {
            .page {
                max-width: 600px;
                margin: 2rem auto;
                box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            }
        }

        /* Info footer adicional */
        .info-footer {
            background: #8b5a3c;
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .info-footer a {
            color: #ffd700;
            text-decoration: none;
        }

        .info-footer a:hover {
            text-decoration: underline;
        }

        .batifondo-footer {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.3);
            opacity: 0.8;
        }

        .batifondo-footer img {
            max-width: 150px;
            margin: 0.5rem 0;
            filter: brightness(0) invert(1);
        }

        /* Portada con botones */
        .portada-container {
            position: relative;
            width: 100%;
        }

        .portada-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .portada-buttons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }

        .menu-button {
            background: rgba(139, 90, 60, 0.9);
            color: white;
            padding: 1.2rem 2.5rem;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 3px solid white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .menu-button:hover {
            transform: scale(1.05);
            background: rgba(139, 90, 60, 1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .menu-button:active {
            transform: scale(0.98);
        }

        /* Ajustes responsive */
        @media (max-width: 600px) {
            .menu-button {
                font-size: 1.1rem;
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <!-- Portada con botones interactivos -->
        <div class="page-section portada-container">
            <img src="1.jpg" alt="Cuatro Perras - Portada">
            <div class="portada-buttons">
                <a href="#desayunos" class="menu-button">☕ Desayunos Atómicos</a>
                <a href="#gochismo" class="menu-button">🌙 Noche de Gochismo</a>
            </div>
        </div>

        <!-- Desayunos Atómicos - Visual -->
        <div class="page-section" id="desayunos">
            <img src="2.jpg" alt="Desayunos Atómicos - Categorías">
        </div>

        <!-- Desayunos Atómicos - Dulces -->
        <div class="page-section">
            <img src="3.jpg" alt="Desayunos Atómicos - Dulces">
        </div>

        <!-- Desayunos Atómicos - Tostas -->
        <div class="page-section">
            <img src="4.jpg" alt="Desayunos Atómicos - Tostas y Tostadas">
        </div>

        <!-- Desayunos Atómicos - Jugos -->
        <div class="page-section">
            <img src="5.jpg" alt="Desayunos Atómicos - Jugos y Frutas">
        </div>

        <!-- Noche de Gochismo -->
        <div class="page-section" id="gochismo">
            <img src="6.jpg" alt="Noche de Gochismo - Burgers">
        </div>

        <!-- Footer con info de contacto -->
        <div class="info-footer">
            <p style="font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem;">✨ Gracias por visitarnos, familia ✨</p>
            
            <p><strong>📍 Rúa as Hortensias, s/n</strong></p>
            <p>15130 Corcubión, A Coruña</p>
            <p>📱 Instagram: <a href="https://instagram.com/cuatro__perras" target="_blank">@cuatro__perras</a></p>
            
            <div class="batifondo-footer">
                <img src="batifondo.png" alt="Batifondo Familia Hostelera">
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">© 2025 Cuatro Perras</p>
            </div>
        </div>
    </div>

</body>
</html>
